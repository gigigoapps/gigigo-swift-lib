name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop

jobs:
  test:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run iOS tests
        run: xcodebuild -scheme GIGLibrary -destination 'platform=iOS Simulator,name=iPhone 17 Pro,OS=latest' test
